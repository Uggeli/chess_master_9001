defaults:
  - base

model:
  d_model: 64
  n_layers: 2
  n_heads: 4
  d_ff: 256
  dropout: 0.15
  retrieval_dim: 32

data:
  train_path: data/processed/train.npz
  val_path: data/processed/val.npz

training:
  max_steps: 50000
  checkpoint_every: 2000
  eval_every: 500
  batch_size: 256

active_phase: 1
run_dir: runs/phase_a_small
